name: Deploy Website

on:
  push:
    branches: [ "gh-pages" ] # Mapeia a branch onde colaste o conteúdo do dist

  workflow_dispatch:

# Permissões necessárias para o deploy funcionar
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # Passo 1: Descarrega os ficheiros da raiz do repositório
      - name: Checkout Código
        uses: actions/checkout@v4

      # Passo 2: Inicializa o ambiente do Pages
      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      # Passo 3: Faz o upload da raiz 
      - name: Fazer Upload dos Ficheiros
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # O ponto confirma que o HTML está mesmo na raiz da branch

      # Passo 4: Lança o site na internet
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
